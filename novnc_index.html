<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drone Swarm Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }
    #status {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #7cf;
      font-family: monospace;
      font-size: 20px;
      text-align: center;
      z-index: 99;
      pointer-events: none;
    }
    #screen { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="status">⏳ Connecting to simulation...</div>
  <div id="screen"></div>
  <script type="module">
    import RFB from '/core/rfb.js';

    const statusEl = document.getElementById('status');
    const screen   = document.getElementById('screen');

    function wsURL() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const host  = location.hostname;
      const port  = location.port || (location.protocol === 'https:' ? '443' : '80');
      return proto + '://' + host + ':' + port + '/websockify';
    }

    function connect() {
      statusEl.style.display = 'block';
      statusEl.textContent = '⏳ Connecting to simulation...';

      let rfb;
      try {
        rfb = new RFB(screen, wsURL());
      } catch(e) {
        statusEl.textContent = '❌ RFB error: ' + e.message;
        setTimeout(connect, 3000);
        return;
      }

      rfb.scaleViewport = true;
      rfb.resizeSession = false;
      rfb.background    = '#111111';

      rfb.addEventListener('connect', () => {
        statusEl.style.display = 'none';
        console.log('VNC connected');
      });

      rfb.addEventListener('disconnect', (e) => {
        statusEl.style.display = 'block';
        statusEl.textContent = '🔄 Reconnecting...';
        console.warn('VNC disconnected', e.detail);
        setTimeout(connect, 3000);
      });

      rfb.addEventListener('securityfailure', (e) => {
        statusEl.textContent = '🔒 Security error: ' + (e.detail.reason || 'unknown');
        setTimeout(connect, 5000);
      });
    }

    setTimeout(connect, 800);
  </script>
</body>
</html>
